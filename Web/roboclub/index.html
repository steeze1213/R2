<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로보클럽 로그인</title>
    <link rel="stylesheet" href="./css/pages/common.css">
    <link rel="stylesheet" href="./css/pages/index.css">
</head>
<body>
    <div class="container">
        <div class="login">
            <div class="login__logo">
                <div class="login__head">
                    <div class="login__eye"></div>
                    <div class="login__eye"></div>
                </div>
            </div>
            <h3 class="login__title">로보클럽</h3>
            <form class="login__form" action="./friends.html">
                <input type="text" class="login__input" placeholder="로보클럽 계정 (이메일 또는 전화번호)">
                <input type="password" class="login__input" placeholder="비밀번호">
                <input type="submit" class="login__btn" value="로그인">
            </form>
            <div class="login__footer">
                계정 찾기 | 비밀번호 재설정
            </div>
        </div>
    </div>
</body>
</html>
